<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nginx2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .badge {
            display: inline-block;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 9999px;
            padding: 0.35rem 1rem;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .info-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            text-align: left;
        }

        .info-card .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #475569;
            margin-bottom: 0.3rem;
        }

        .info-card .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 0.4rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Deployed via Ansible</div>
        <h1>nginx2</h1>
        <p class="subtitle">
            <span class="status-dot"></span>nginx is running on EC2
        </p>

        <div class="info-grid">
            <div class="info-card">
                <div class="label">Project</div>
                <div class="value">nginx2</div>
            </div>
            <div class="info-card">
                <div class="label">App</div>
                <div class="value">nginx</div>
            </div>
            <div class="info-card">
                <div class="label">Region</div>
                <div class="value">us-west-1</div>
            </div>
            <div class="info-card">
                <div class="label">Target</div>
                <div class="value">EC2</div>
            </div>
        </div>
    </div>
</body>
</html>
